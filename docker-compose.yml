version: '3.8'

services:
  api:
    build: .
    container_name: inbound_api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      # Sobrescreve local para uso no docker compose ligando ao container do db
      - MONGO_URL=mongodb://mongodb:27017/inbound_db
    depends_on:
      - mongodb
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  mongodb:
    image: mongo:6.0
    container_name: inbound_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
